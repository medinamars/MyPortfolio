<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Password Generator</title>
<link rel="icon" href="/MyPortfolio/pg-icon.png" />
<style>
    body {
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
    }
    .container {
        background: #1e293b;
        padding: 20px;
        border-radius: 12px;
        width: 320px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
  h3 {
    margin: 4px 0;
  }
    input, button {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border-radius: 8px;
        border: none;
        font-size: 14px;
    }
  input {
    width: calc(100% - 20px);
  }
    button {
        cursor: pointer;
        background: #3b82f6;
        color: white;
        font-weight: bold;
    }
    button:hover {
        background: #2563eb;
    }
    .output {
        padding: 10px;
        border-radius: 8px;
        margin: 4px 0;
        word-break: break-all;
    font-weight: bold;
    text-align: center;
    }
    label {
        font-size: 12px;
        display: block;
        margin-top: 8px;
        color: #94a3b8;
    }
  .btn-animate {
    transform: scale(0.98);
    transition: transform 50ms ease;
  }
  .btn-animate-pop {
    transform: scale(1.02);
    transition: transform 50ms ease;
  }
  .row {
    display: flex;        
    flex-direction: row;   
    gap: 10px; 
  }
</style>
</head>
<body>

<div class="container">
    <h3>Password Generator</h3>
  <input type="text" class="output" id="output" value="Click generate..." />
    <label>Password Length</label>
    <input type="number" id="length" min="6" max="64" value="12" oninput="saveLength();generatePassword();"/>
  <button onclick="generateAndCopyPassword(this)">Generate & Copy</button>
  <div class="row">
    <button onclick="generatePassword(this)">Generate</button>
    <button onclick="copyPassword(this)">Copy</button>
  </div>
</div>

<script>
const LOWER = "acdefghijkmnopqrstuwxyz"; 
const UPPER = "ACDEFHJKLMNPQRTUWXYZ"; 
const NUMBERS = "234789"; 
const SYMBOLS = "!@#$%*-_+[];:,.";

function saveLength() {
  const val = document.getElementById("length").value;
  document.cookie = "pgLength=" + val + ";max-age=31536000;path=/MyPortfolio/PasswordGenerator/";
}

function loadLength() {
  const match = document.cookie.match(/pgLength=(\d+)/);
  if (match) {
    const val = parseInt(match[1]);
    if (val >= 6 && val <= 64) {
      document.getElementById("length").value = val;
    }
  }
}

loadLength();

function animateButton(button) {
  if (typeof button == 'undefined') return; 
    button.classList.remove("btn-animate", "btn-animate-pop");
    void button.offsetWidth;
    button.classList.add("btn-animate");
    setTimeout(() => {
        button.classList.add("btn-animate-pop");
    }, 50);
    setTimeout(() => {
        button.classList.remove("btn-animate", "btn-animate-pop");
    }, 100);
}

function copyPassword(sender) {
    const text = document.getElementById("output").value;
    navigator.clipboard.writeText(text);
  animateButton(sender);
}

function generatePassword(sender) {
    const length = parseInt(document.getElementById("length").value);

    const allChars = LOWER + UPPER + NUMBERS + SYMBOLS;

    let password = "";

    password += randomChar(LOWER);
    password += randomChar(UPPER);
    password += randomChar(NUMBERS);
    password += randomChar(SYMBOLS);

    for (let i = password.length; i < length; i++) {
        password += randomChar(allChars);
    }

    password = shuffle(password);

    document.getElementById("output").value = password;
  
  animateButton(sender);
}

function generateAndCopyPassword(sender) {
  generatePassword();
  copyPassword();
  animateButton(sender);
}

function randomChar(str) {
    return str[Math.floor(Math.random() * str.length)];
}

function shuffle(str) {
    return str.split('').sort(() => 0.5 - Math.random()).join('');
}

setTimeout(() => {
  generatePassword();
}, 100);

</script>

</body>

</html>
